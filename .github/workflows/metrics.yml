# Regenerates github-metrics.svg for the profile README (lowlighter/metrics).
# Works out of the box with the default token; add a classic PAT as the
# METRICS_TOKEN secret (scopes: read:user, read:org) for richer data.
name: Metrics
on:
  schedule: [{cron: "0 3 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Update metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: jestivald
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Moscow
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_colors: github
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts_type: classic
          plugin_stars: yes
          plugin_stars_limit: 3
